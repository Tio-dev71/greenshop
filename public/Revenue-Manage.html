<!DOCTYPE html>
<html lang="vi">
<head>

</head>
<body>
<script>
    // Script bảo vệ trang admin
    (function protectAdminPage() {
        const token = localStorage.getItem('authToken');
        const authUserString = localStorage.getItem('authUser');
        let isAdmin = false;
        if (token && authUserString) {
            try {
                const authUser = JSON.parse(authUserString);
                if (authUser && authUser.Role === 1) isAdmin = true;
            } catch (e) { console.error("Error parsing authUser for admin check", e); }
        }
        if (!isAdmin) {
            console.log('Access to admin page denied. Redirecting to login.');
            localStorage.removeItem('authToken'); localStorage.removeItem('authUser');
            window.location.href = 'Login.html';
        } else {
            console.log('Admin access granted.');
        }
    })();
</script>
